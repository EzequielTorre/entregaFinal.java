# H2 Database (In-Memory, no requiere instalación)
spring.datasource.url=jdbc:h2:mem:techlab_db;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (para ver la base de datos en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Cambia el puerto a 8082 para evitar conflictos
server.port=8082

# Permite servir contenido estático desde /static
spring.web.resources.static-locations=classpath:/static/
