# Configuración del servidor
server.port=8082

# H2 Database en ARCHIVO (persistente - NO se pierden datos al cerrar la app)
spring.datasource.url=jdbc:h2:file:./data/techlabdb;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (URL para ver la DB: http://localhost:8082/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Permite servir contenido estático desde /static
spring.web.resources.static-locations=classpath:/static/
