# H2 Database (Persistente: guarda datos en disco)
spring.datasource.url=jdbc:h2:file:./data/techlab_db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (para ver la base de datos en http://localhost:8082/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate: actualiza las tablas sin borrarlas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Cambia el puerto a 8082 para evitar conflictos
server.port=8082

# Permite servir contenido estático desde /static
spring.web.resources.static-locations=classpath:/static/
